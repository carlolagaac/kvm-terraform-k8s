---
- name: Wait for cloud-init and verify k8s prerequisites
  hosts: k8s
  become: true
  gather_facts: false
  tasks:
    - name: Wait for SSH
      ansible.builtin.wait_for_connection:
        timeout: 300

    - name: Wait for cloud-init to finish
      ansible.builtin.shell: "cloud-init status --wait; [ \"$(cloud-init status)\" = 'status: done' ]"
      changed_when: false

    - name: Verify kubelet is installed
      ansible.builtin.command: kubelet --version
      changed_when: false

- name: Fix containerd and prepare nodes
  hosts: k8s
  become: true
  tasks:
    - name: Ensure sandbox_image is set in containerd config
      ansible.builtin.lineinfile:
        path: /etc/containerd/config.toml
        regexp: 'sandbox_image\s*='
        line: '    sandbox_image = "registry.k8s.io/pause:3.10"'
      notify: restart containerd

    - name: Ensure SystemdCgroup is enabled
      ansible.builtin.replace:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup = false'
        replace: 'SystemdCgroup = true'
      notify: restart containerd

  handlers:
    - name: restart containerd
      ansible.builtin.systemd:
        name: containerd
        state: restarted

- name: Initialize control plane
  hosts: control_plane
  become: true
  tasks:
    - name: Check if already initialized
      ansible.builtin.stat:
        path: /etc/kubernetes/admin.conf
      register: kubeadm_init

    - name: Reset failed kubeadm state if needed
      ansible.builtin.command: kubeadm reset -f
      when: not kubeadm_init.stat.exists

    - name: Run kubeadm init
      ansible.builtin.command: >
        kubeadm init
        --pod-network-cidr=10.244.0.0/16
        --apiserver-advertise-address={{ ansible_default_ipv4.address }}
      when: not kubeadm_init.stat.exists

    - name: Set up kubeconfig for fedora user
      when: not kubeadm_init.stat.exists
      block:
        - ansible.builtin.file:
            path: /home/fedora/.kube
            state: directory
            owner: fedora
            group: fedora
        - ansible.builtin.copy:
            src: /etc/kubernetes/admin.conf
            dest: /home/fedora/.kube/config
            remote_src: true
            owner: fedora
            group: fedora
            mode: "0600"

    - name: Install Flannel CNI
      become: false
      ansible.builtin.command: kubectl apply -f https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml
      when: not kubeadm_init.stat.exists

    - name: Wait for API server to be ready
      ansible.builtin.wait_for:
        host: "{{ ansible_default_ipv4.address }}"
        port: 6443
        timeout: 300

    - name: Generate join command
      ansible.builtin.command: kubeadm token create --print-join-command
      changed_when: false
      register: join_command

    - name: Store join command
      ansible.builtin.set_fact:
        k8s_join_command: "{{ join_command.stdout }}"

    - name: Fetch kubeconfig
      ansible.builtin.fetch:
        src: /etc/kubernetes/admin.conf
        dest: ../kube-config.yaml
        flat: true

- name: Join workers
  hosts: workers
  become: true
  tasks:
    - name: Check if already joined
      ansible.builtin.stat:
        path: /etc/kubernetes/kubelet.conf
      register: kubelet_conf

    - name: Join cluster
      ansible.builtin.command: "{{ hostvars[groups['control_plane'][0]].k8s_join_command }}"
      when: not kubelet_conf.stat.exists
